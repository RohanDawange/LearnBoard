<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LearnBoard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ── RESET & ROOT ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0b0d;
    --bg2:       #0e1014;
    --bg3:       #13151a;
    --panel:     #111318;
    --border:    #1e2128;
    --border2:   #262b35;
    --orange:    #f97316;
    --orange-d:  #c2570f;
    --orange-glow: rgba(249,115,22,0.18);
    --orange-dim:  rgba(249,115,22,0.07);
    --amber:     #fbbf24;
    --green:     #22c55e;
    --red:       #ef4444;
    --text:      #d4d8e0;
    --text2:     #6b7280;
    --text3:     #3a3f4a;
    --mono:      'JetBrains Mono', monospace;
    --head:      'Rajdhani', sans-serif;
    --hand:      'Caveat', cursive;
  }

  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }

  body {
    font-family: var(--mono);
    color: var(--text);
    /* subtle scanline texture */
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.012) 2px,
        rgba(255,255,255,0.012) 4px
      );
  }

  #root { width: 100%; height: 100%; display: flex; flex-direction: column; }


  /* ── SPLASH SCREEN ── */
  #splash-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #0a0b0d;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  #splash-overlay.hide {
    opacity: 0;
    transform: scale(1.04);
    pointer-events: none;
  }

  .splash-logo-wrap {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* spinning ring behind logo */
  .splash-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #f97316;
    border-right-color: rgba(249,115,22,0.3);
    animation: ring-spin 1.8s linear infinite;
  }
  .splash-ring-2 {
    position: absolute;
    inset: -22px;
    border-radius: 50%;
    border: 1px solid transparent;
    border-bottom-color: rgba(249,115,22,0.5);
    border-left-color: rgba(249,115,22,0.2);
    animation: ring-spin 3s linear infinite reverse;
  }
  .splash-ring-3 {
    position: absolute;
    inset: -34px;
    border-radius: 50%;
    border: 1px dashed rgba(249,115,22,0.15);
    animation: ring-spin 8s linear infinite;
  }

  @keyframes ring-spin { to { transform: rotate(360deg); } }

  /* glow pulse behind logo */
  .splash-glow {
    position: absolute;
    inset: -20px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(249,115,22,0.18) 0%, transparent 70%);
    animation: glow-pulse 2s ease-in-out infinite;
  }
  @keyframes glow-pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.12); }
  }

  .splash-logo-img {
    width: 160px;
    height: 160px;
    object-fit: contain;
    position: relative;
    z-index: 2;
    animation: splash-logo-in 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
    animation-delay: 0.1s;
    filter: drop-shadow(0 0 20px rgba(249,115,22,0.4));
  }
  @keyframes splash-logo-in {
    0%   { opacity: 0; transform: scale(0.3) rotate(-30deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .splash-title {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 2.6rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #f97316;
    text-shadow: 0 0 30px rgba(249,115,22,0.6), 0 0 60px rgba(249,115,22,0.2);
    animation: splash-title-in 0.7s ease both;
    animation-delay: 0.4s;
    opacity: 0;
  }
  @keyframes splash-title-in {
    0%   { opacity: 0; transform: translateY(16px); filter: blur(8px); }
    100% { opacity: 1; transform: translateY(0);   filter: blur(0); }
  }

  .splash-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 4px;
    color: #3a3f4a;
    text-transform: uppercase;
    animation: splash-title-in 0.7s ease both;
    animation-delay: 0.7s;
    opacity: 0;
  }

  .splash-bar {
    width: 200px;
    height: 2px;
    background: #1e2128;
    border-radius: 2px;
    overflow: hidden;
    animation: splash-title-in 0.4s ease both;
    animation-delay: 0.9s;
    opacity: 0;
  }
  .splash-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #f97316, #fbbf24);
    border-radius: 2px;
    animation: bar-fill 1.4s cubic-bezier(0.4,0,0.2,1) both;
    animation-delay: 1s;
    width: 0%;
  }
  @keyframes bar-fill {
    0%   { width: 0%; box-shadow: none; }
    80%  { width: 100%; }
    100% { width: 100%; box-shadow: 0 0 12px rgba(249,115,22,0.6); }
  }

  .splash-particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .spark {
    position: absolute;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: #f97316;
    animation: spark-float linear infinite;
    opacity: 0;
  }
  @keyframes spark-float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-20px) scale(1.5); opacity: 0; }
  }


  /* ── TOPBAR ── */
  .topbar {
    height: 48px;
    min-height: 48px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 14px;
    position: relative;
    z-index: 50;
    box-shadow: 0 1px 0 rgba(249,115,22,0.06);
  }

  .logo {
    font-family: var(--head);
    font-weight: 700;
    font-size: 1.25rem;
    color: var(--orange);
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    text-shadow: 0 0 20px rgba(249,115,22,0.5);
  }
  .logo-icon {
    width: 36px; height: 36px;
    flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
    filter: drop-shadow(0 0 8px rgba(249,115,22,0.5));
    animation: logo-spin-entry 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .logo-icon img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }
  @keyframes logo-spin-entry {
    0%   { transform: rotate(-180deg) scale(0); opacity: 0; filter: drop-shadow(0 0 0px rgba(249,115,22,0)); }
    60%  { filter: drop-shadow(0 0 20px rgba(249,115,22,0.9)); }
    100% { transform: rotate(0deg) scale(1); opacity: 1; filter: drop-shadow(0 0 8px rgba(249,115,22,0.5)); }
  }
  .logo-sep {
    width: 1px; height: 20px;
    background: var(--border2);
    margin: 0 2px;
    flex-shrink: 0;
  }

  /* URL Input */
  .url-form {
    flex: 1;
    display: flex;
    gap: 6px;
    max-width: 540px;
  }
  .url-input {
    flex: 1;
    height: 30px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 0 10px;
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 0;
  }
  .url-input::placeholder { color: var(--text3); }
  .url-input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 2px var(--orange-glow);
  }
  .btn-load {
    height: 30px;
    padding: 0 14px;
    background: var(--orange);
    border: none;
    border-radius: 4px;
    font-family: var(--head);
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 1px;
    color: #000;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .btn-load:hover { background: var(--amber); box-shadow: 0 0 12px var(--orange-glow); }
  .btn-load:active { transform: scale(0.97); }

  .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }

  /* ── TIMER ── */
  .timer-block {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 4px 10px;
  }
  .timer-digits {
    font-family: var(--mono);
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--orange);
    letter-spacing: 2px;
    min-width: 62px;
    text-align: center;
    text-shadow: 0 0 10px rgba(249,115,22,0.5);
    transition: color 0.3s;
  }
  .timer-digits.paused { color: var(--text2); text-shadow: none; }
  .timer-btns { display: flex; gap: 4px; }
  .timer-btn {
    width: 26px; height: 26px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .timer-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
  .timer-btn.running { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
  .timer-btn.reset-btn:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.07); }

  /* ── MAIN SPLIT LAYOUT ── */
  .workspace {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    gap: 0;
  }

  /* ── VIDEO PANE ── */
  .video-pane {
    background: #000;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .video-embed {
    flex: 1;
    position: relative;
    background: #000;
  }
  .video-embed iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
  .video-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    background: var(--bg2);
  }
  .placeholder-art {
    width: 80px; height: 80px;
    border: 2px solid var(--border2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .placeholder-art::before {
    content: '';
    position: absolute; inset: -8px;
    border-radius: 50%;
    border: 1px dashed var(--border2);
    animation: spin 12s linear infinite;
  }
  .placeholder-art::after {
    content: '';
    position: absolute; inset: -18px;
    border-radius: 50%;
    border: 1px dotted var(--border);
    animation: spin 20s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .play-triangle {
    width: 0; height: 0;
    border-top: 16px solid transparent;
    border-bottom: 16px solid transparent;
    border-left: 28px solid var(--orange);
    margin-left: 6px;
    filter: drop-shadow(0 0 8px rgba(249,115,22,0.5));
  }
  .placeholder-label {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.8;
  }
  .placeholder-label strong { color: var(--text2); }

  /* video footer */
  .video-footer {
    height: 36px;
    min-height: 36px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
  }
  .vf-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
  }
  .vf-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.6s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .vf-label {
    font-size: 0.65rem;
    color: var(--text2);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  /* ── NOTEPAD PANE ── */
  .notepad-pane {
    background: var(--bg2);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  .notepad-header {
    height: 44px;
    min-height: 44px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
    flex-shrink: 0;
  }
  .notepad-header-title {
    font-family: var(--head);
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--orange);
    text-shadow: 0 0 16px rgba(249,115,22,0.4);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .notepad-header-title svg { flex-shrink: 0; }

  .notepad-tabs {
    display: flex;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
    gap: 0;
  }
  .notepad-tabs::-webkit-scrollbar { height: 0; }

  .np-tab {
    height: 30px;
    padding: 0 12px;
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 1px;
    color: var(--text3);
    border: none;
    border-right: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .np-tab:hover { color: var(--text2); background: var(--bg2); }
  .np-tab.active {
    color: var(--orange);
    background: var(--bg2);
    border-bottom: 2px solid var(--orange);
  }
  .np-tab-x {
    width: 13px; height: 13px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, background 0.15s;
    color: var(--text3);
  }
  .np-tab:hover .np-tab-x { opacity: 1; }
  .np-tab-x:hover { color: var(--red); background: rgba(239,68,68,0.12); }
  .np-tab-add {
    height: 30px;
    padding: 0 12px;
    font-size: 1rem;
    line-height: 1;
    color: var(--text3);
    border: none;
    background: transparent;
    cursor: pointer;
    transition: color 0.15s;
    flex-shrink: 0;
    display: flex; align-items: center;
  }
  .np-tab-add:hover { color: var(--orange); }

  /* The actual writing area */
  .notepad-body {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* Paper lines bg */
  .notepad-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        transparent,
        transparent 31px,
        rgba(249, 115, 22, 0.06) 31px,
        rgba(249, 115, 22, 0.06) 32px
      );
    background-attachment: local;
    pointer-events: none;
    z-index: 0;
  }

  /* left margin red line */
  .notepad-body::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: 42px;
    width: 1px;
    background: rgba(239, 68, 68, 0.18);
    pointer-events: none;
    z-index: 1;
  }

  .np-textarea {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    padding: 10px 16px 16px 56px;
    font-family: var(--hand);
    font-size: 1.2rem;
    font-weight: 500;
    line-height: 32px;
    color: #e8dcc8;
    caret-color: var(--orange);
    overflow-y: auto;
    position: relative;
    z-index: 2;
    letter-spacing: 0.3px;
  }
  .np-textarea::placeholder {
    color: var(--text3);
    font-family: var(--hand);
    font-size: 1.1rem;
    font-style: italic;
    line-height: 32px;
  }
  .np-textarea::-webkit-scrollbar { width: 4px; }
  .np-textarea::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* Footer */
  .notepad-footer {
    height: 36px;
    min-height: 36px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    flex-shrink: 0;
  }
  .np-save-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .np-save-dot.saved {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }
  .np-meta {
    font-size: 0.6rem;
    color: var(--text3);
    letter-spacing: 1px;
  }
  .np-meta span { color: var(--text2); }

  .np-actions { display: flex; align-items: center; gap: 6px; margin-left: auto; }

  .np-btn {
    height: 24px;
    padding: 0 10px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: transparent;
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .np-btn-download {
    color: var(--orange);
    border-color: var(--orange-d);
    background: var(--orange-dim);
  }
  .np-btn-download:hover {
    background: var(--orange);
    color: #000;
    box-shadow: 0 0 10px var(--orange-glow);
  }
  .np-btn-pdf {
    color: #f43f5e;
    border-color: #7f1d1d;
    background: rgba(244, 63, 94, 0.07);
  }
  .np-btn-pdf:hover {
    background: #f43f5e;
    border-color: #f43f5e;
    color: #fff;
    box-shadow: 0 0 10px rgba(244,63,94,0.3);
  }
  .np-btn-clear {
    color: var(--text3);
  }
  .np-btn-clear:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.06); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── STATUS BADGE ── */
  .status-badge {
    font-size: 0.6rem;
    color: var(--text3);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--bg3);
    white-space: nowrap;
  }

  /* ── VIDEO ERROR & LOADING ── */
  .embed-error-box {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 24px;
    background: #0d0f14;
    text-align: center;
  }
  .embed-error-icon { opacity: 0.9; }
  .embed-error-title {
    font-family: var(--head);
    font-size: 1.1rem; font-weight: 700;
    color: #f97316; letter-spacing: 1px;
  }
  .embed-error-msg {
    font-family: var(--mono);
    font-size: 0.72rem; color: #6b7280;
    line-height: 1.7;
  }
  .embed-error-thumb {
    width: 180px; border-radius: 6px; overflow: hidden;
    border: 1px solid #1e2128;
  }
  .embed-error-thumb img { width: 100%; display: block; }
  .embed-open-btn {
    display: flex; align-items: center;
    gap: 6px;
    background: #f97316; color: #000;
    border: none; border-radius: 6px;
    padding: 8px 18px;
    font-family: var(--head); font-weight: 700;
    font-size: 0.9rem; letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .embed-open-btn:hover { background: #fb923c; transform: scale(1.03); }
  .embed-retry-btn {
    background: transparent; color: #3a3f4a;
    border: 1px solid #1e2128; border-radius: 4px;
    padding: 4px 14px;
    font-family: var(--mono); font-size: 0.65rem;
    cursor: pointer; transition: color 0.2s, border-color 0.2s;
  }
  .embed-retry-btn:hover { color: #f97316; border-color: rgba(249,115,22,0.4); }

  .video-loading {
