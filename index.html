<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LearnBoard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Rajdhani:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0d;--bg2:#0e1014;--bg3:#111318;--panel:#13151a;
  --border:#1e2128;--border2:#262b35;
  --orange:#f97316;--orange-d:#c2570f;--orange-glow:rgba(249,115,22,0.18);
  --amber:#fbbf24;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;
  --text:#d4d8e0;--text2:#6b7280;--text3:#3a3f4a;
  --mono:"JetBrains Mono",monospace;--head:"Rajdhani",sans-serif;--hand:"Caveat",cursive;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body{font-family:var(--mono);color:var(--text);
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.012) 2px,rgba(255,255,255,0.012) 4px);}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── SPLASH ── */
#splash-overlay{
  position:fixed;inset:0;background:#0a0b0d;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity 0.6s ease;
}
.splash-ring-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;}
.splash-ring{position:absolute;inset:0;border-radius:50%;}
.splash-ring-1{border:2px solid transparent;border-top-color:var(--orange);border-right-color:var(--orange);animation:rspin 1.8s linear infinite;}
.splash-ring-2{inset:-16px;border:1px solid transparent;border-bottom-color:var(--orange);border-left-color:rgba(249,115,22,0.5);animation:rspin 3s linear infinite reverse;}
.splash-ring-3{inset:-32px;border:1px dashed rgba(249,115,22,0.15);animation:rspin 8s linear infinite;}
@keyframes rspin{to{transform:rotate(360deg)}}
.splash-glow{position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,0.18) 0%,transparent 70%);animation:gpulse 2s ease-in-out infinite;}
@keyframes gpulse{0%,100%{opacity:0.6;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
.splash-logo{width:140px;height:140px;object-fit:contain;position:relative;z-index:2;animation:logoin 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;filter:drop-shadow(0 0 20px rgba(249,115,22,0.4));}
@keyframes logoin{0%{opacity:0;transform:scale(0.3) rotate(-30deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
.splash-title{font-family:var(--head);font-weight:700;font-size:2.4rem;letter-spacing:8px;color:var(--orange);text-shadow:0 0 30px rgba(249,115,22,0.6);animation:textin 0.7s ease 0.4s both;opacity:0;}
.splash-sub{font-family:var(--mono);font-size:0.7rem;letter-spacing:4px;color:var(--text3);animation:textin 0.7s ease 0.7s both;opacity:0;}
@keyframes textin{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
.splash-bar{width:200px;height:2px;background:#1e2128;border-radius:2px;overflow:hidden;animation:textin 0.4s ease 0.9s both;opacity:0;}
.splash-bar-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--amber));animation:barfill 1.4s cubic-bezier(0.4,0,0.2,1) 1s both;}
@keyframes barfill{0%{width:0}100%{width:100%}}
.spark{position:absolute;border-radius:50%;pointer-events:none;animation:sparkfly var(--d,6s) ease-in-out var(--delay,0s) infinite;}
@keyframes sparkfly{0%{transform:translateY(0) scale(1);opacity:0}20%{opacity:1}80%{opacity:0.6}100%{transform:translateY(-100vh) scale(0);opacity:0}}

/* ── TOPBAR ── */
.topbar{height:48px;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;z-index:50;flex-shrink:0;}
.logo{font-family:var(--head);font-weight:700;font-size:1.2rem;color:var(--orange);letter-spacing:2px;display:flex;align-items:center;gap:8px;white-space:nowrap;text-shadow:0 0 20px rgba(249,115,22,0.5);}
.logo-img{width:32px;height:32px;object-fit:contain;border-radius:4px;filter:drop-shadow(0 0 6px rgba(249,115,22,0.5));animation:logospin 1.2s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes logospin{0%{transform:rotate(-180deg) scale(0);opacity:0}100%{transform:rotate(0deg) scale(1);opacity:1}}
.tb-sep{width:1px;height:20px;background:var(--border2);flex-shrink:0;}
.tb-search{flex:1;max-width:320px;height:30px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;padding:0 10px 0 32px;font-family:var(--mono);font-size:0.7rem;color:var(--text);outline:none;transition:border-color 0.2s;}
.tb-search:focus{border-color:var(--orange);box-shadow:0 0 0 2px var(--orange-glow);}
.tb-search-wrap{position:relative;flex:1;max-width:320px;}
.tb-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.tb-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.tb-btn{height:30px;padding:0 12px;background:transparent;border:1px solid var(--border2);border-radius:4px;font-family:var(--mono);font-size:0.62rem;letter-spacing:1px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;white-space:nowrap;}
.tb-btn:hover{border-color:var(--orange);color:var(--orange);}
.tb-btn.primary{background:var(--orange);color:#000;border-color:var(--orange);font-weight:700;}
.tb-btn.primary:hover{background:var(--amber);}

/* ── TIMER ── */
.timer-block{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 10px;}
.timer-digits{font-family:var(--mono);font-size:0.85rem;font-weight:700;color:var(--orange);letter-spacing:2px;min-width:58px;text-align:center;text-shadow:0 0 10px rgba(249,115,22,0.5);}
.timer-digits.paused{color:var(--text2);text-shadow:none;}
.timer-btn{width:24px;height:24px;border-radius:4px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.timer-btn:hover{border-color:var(--orange);color:var(--orange);}

/* ── LAYOUT ── */
.workspace{flex:1;display:grid;grid-template-columns:240px 1fr 1fr;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-header{padding:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.sb-title{font-family:var(--head);font-size:0.85rem;font-weight:700;color:var(--text);letter-spacing:1px;flex:1;}
.sb-add-btn{width:26px;height:26px;border-radius:4px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.3);color:var(--orange);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.sb-add-btn:hover{background:var(--orange);color:#000;}
.sb-body{flex:1;overflow-y:auto;padding:6px;}
.sb-body::-webkit-scrollbar{width:3px;}
.sb-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Notebook item */
.nb-item{margin-bottom:2px;}
.nb-head{display:flex;align-items:center;gap:6px;padding:6px 6px;border-radius:5px;cursor:pointer;transition:background 0.15s;position:relative;}
.nb-head:hover{background:rgba(255,255,255,0.04);}
.nb-head.active{background:rgba(249,115,22,0.1);}
.nb-arrow{font-size:8px;color:var(--text3);transition:transform 0.2s;flex-shrink:0;}
.nb-arrow.open{transform:rotate(90deg);color:var(--orange);}
.nb-icon{font-size:13px;flex-shrink:0;}
.nb-name{flex:1;font-family:var(--mono);font-size:0.68rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nb-count{font-size:0.55rem;color:var(--text3);background:var(--bg3);border-radius:10px;padding:1px 5px;flex-shrink:0;}
.nb-actions{display:none;gap:2px;flex-shrink:0;}
.nb-head:hover .nb-actions{display:flex;}
.nb-action-btn{width:18px;height:18px;border-radius:3px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);transition:all 0.15s;}
.nb-action-btn:hover{background:rgba(249,115,22,0.15);color:var(--orange);}
.nb-action-btn.del:hover{background:rgba(239,68,68,0.15);color:var(--red);}

/* Note item in sidebar */
.nb-notes{padding-left:16px;padding-bottom:4px;}
.note-sb-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:4px;cursor:pointer;transition:background 0.15s;position:relative;}
.note-sb-item:hover{background:rgba(255,255,255,0.03);}
.note-sb-item.active{background:rgba(249,115,22,0.08);border-left:2px solid var(--orange);padding-left:4px;}
.note-sb-dot{width:4px;height:4px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.note-sb-item.active .note-sb-dot{background:var(--orange);}
.note-sb-name{flex:1;font-family:var(--mono);font-size:0.63rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-sb-item.active .note-sb-name{color:var(--text);}
.note-sb-actions{display:none;gap:2px;}
.note-sb-item:hover .note-sb-actions{display:flex;}

/* Inline rename input */
.inline-input{flex:1;background:var(--bg3);border:1px solid var(--orange);border-radius:3px;padding:2px 6px;font-family:var(--mono);font-size:0.68rem;color:var(--text);outline:none;}

/* ── VIDEO PANE ── */
.video-pane{background:#000;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.video-source-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
.vs-tab{flex:1;height:28px;background:transparent;border:none;font-family:var(--mono);font-size:0.6rem;letter-spacing:1px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.vs-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.video-embed{flex:1;position:relative;background:#000;overflow:hidden;}
.video-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.video-footer{height:28px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;}
.vf-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.vf-dot.live{background:var(--green);box-shadow:0 0 6px var(--green);}
.vf-label{flex:1;font-family:var(--mono);font-size:0.58rem;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.status-badge{font-family:var(--mono);font-size:0.55rem;letter-spacing:1px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:1px 6px;}
.video-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg2);}
.placeholder-art{width:70px;height:70px;border:2px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;}
.placeholder-art::before{content:"";position:absolute;inset:-8px;border-radius:50%;border:1px dashed var(--border2);animation:spin 12s linear infinite;}
.placeholder-art::after{content:"";position:absolute;inset:-18px;border-radius:50%;border:1px dotted var(--border);animation:spin 20s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg)}}
.play-triangle{width:0;height:0;border-top:14px solid transparent;border-bottom:14px solid transparent;border-left:24px solid var(--orange);margin-left:5px;filter:drop-shadow(0 0 8px rgba(249,115,22,0.5));}
.placeholder-label{font-family:var(--mono);font-size:0.65rem;color:var(--text3);text-align:center;line-height:1.8;}

/* Local video */
.local-drop-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;background:var(--bg2);border:2px dashed var(--border2);cursor:pointer;transition:all 0.2s;}
.local-drop-zone:hover,.local-drop-zone.drag-over{border-color:var(--orange);background:rgba(249,115,22,0.03);}
.local-drop-icon{width:60px;height:60px;border:2px solid var(--border2);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--orange);background:rgba(249,115,22,0.06);transition:all 0.2s;}
.local-drop-zone:hover .local-drop-icon{border-color:var(--orange);box-shadow:0 0 20px rgba(249,115,22,0.2);}

/* Error 153 */
.embed-error-box{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;background:#0a0b0d;text-align:center;}
.embed-open-btn{display:flex;align-items:center;gap:6px;background:var(--orange);color:#000;border:none;border-radius:6px;padding:8px 18px;font-family:var(--head);font-weight:700;font-size:0.9rem;cursor:pointer;transition:all 0.2s;}
.embed-open-btn:hover{background:var(--amber);transform:scale(1.03);}
.embed-retry-btn{background:transparent;color:var(--text3);border:1px solid var(--border);border-radius:4px;padding:4px 12px;font-family:var(--mono);font-size:0.62rem;cursor:pointer;transition:all 0.15s;}
.embed-retry-btn:hover{color:var(--orange);border-color:rgba(249,115,22,0.4);}
.video-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#0a0b0d;z-index:10;}
.vl-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:rspin 0.8s linear infinite;}
.vl-text{font-family:var(--mono);font-size:0.6rem;color:var(--text3);letter-spacing:2px;}

/* ── NOTE EDITOR PANE ── */
.note-pane{display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);}
.note-pane-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3);}
.note-pane-empty-title{font-family:var(--head);font-size:1.1rem;font-weight:600;letter-spacing:2px;}
.note-pane-empty-sub{font-family:var(--mono);font-size:0.65rem;line-height:1.8;text-align:center;}

/* Note header */
.note-header{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0;background:var(--bg3);}
.note-title-row{display:flex;align-items:center;gap:8px;}
.note-title-input{flex:1;background:transparent;border:none;font-family:var(--head);font-size:1.2rem;font-weight:700;color:var(--text);outline:none;letter-spacing:1px;}
.note-title-input::placeholder{color:var(--text3);}
.note-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.note-date{font-family:var(--mono);font-size:0.58rem;color:var(--text3);}

/* Tags */
.tag{display:inline-flex;align-items:center;gap:4px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.25);border-radius:12px;padding:2px 8px;font-family:var(--mono);font-size:0.58rem;color:var(--orange);cursor:pointer;transition:all 0.15s;}
.tag:hover{background:rgba(249,115,22,0.2);}
.tag-del{font-size:10px;opacity:0.6;transition:opacity 0.15s;}
.tag-del:hover{opacity:1;}
.tag-add-input{height:22px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:0 10px;font-family:var(--mono);font-size:0.58rem;color:var(--text);outline:none;width:120px;transition:border-color 0.2s;}
.tag-add-input:focus{border-color:rgba(249,115,22,0.4);}

/* Progress bar */
.progress-row{display:flex;align-items:center;gap:8px;padding:0 2px;}
.progress-label{font-family:var(--mono);font-size:0.58rem;color:var(--text3);white-space:nowrap;}
.progress-slider{flex:1;-webkit-appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none;cursor:pointer;}
.progress-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--orange);cursor:pointer;box-shadow:0 0 6px rgba(249,115,22,0.4);}
.progress-val{font-family:var(--mono);font-size:0.6rem;color:var(--orange);min-width:30px;text-align:right;}

/* ── TOOLBAR ── */
.editor-toolbar{display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid var(--border);gap:2px;flex-wrap:wrap;background:var(--panel);flex-shrink:0;}
.tb-group{display:flex;align-items:center;gap:2px;}
.tb-divider{width:1px;height:18px;background:var(--border2);margin:0 4px;}
.tool-btn{width:26px;height:26px;border-radius:4px;background:transparent;border:1px solid transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:0.7rem;font-weight:700;transition:all 0.15s;flex-shrink:0;}
.tool-btn:hover{background:rgba(249,115,22,0.1);border-color:rgba(249,115,22,0.3);color:var(--orange);}
.tool-btn.active{background:rgba(249,115,22,0.15);border-color:rgba(249,115,22,0.4);color:var(--orange);}
.tool-select{height:26px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;font-family:var(--mono);font-size:0.62rem;color:var(--text2);padding:0 6px;outline:none;cursor:pointer;transition:border-color 0.15s;}
.tool-select:hover{border-color:rgba(249,115,22,0.4);}
.color-btn{width:20px;height:20px;border-radius:3px;border:2px solid var(--border2);cursor:pointer;transition:border-color 0.15s;}
.color-btn:hover{border-color:var(--orange);}

/* ── EDITOR AREA ── */
.editor-body{flex:1;overflow-y:auto;padding:16px 20px;background:var(--bg2);}
.editor-body::-webkit-scrollbar{width:5px;}
.editor-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.editor-content{min-height:100%;outline:none;font-family:var(--hand);font-size:1.1rem;line-height:1.9;color:#e8dcc8;caret-color:var(--orange);}
.editor-content:empty::before{content:attr(data-placeholder);color:var(--text3);pointer-events:none;font-style:italic;}

/* Rich text styles */
.editor-content h1{font-family:var(--head);font-size:2rem;font-weight:700;color:var(--text);letter-spacing:2px;margin:16px 0 8px;border-bottom:1px solid rgba(249,115,22,0.3);padding-bottom:6px;}
.editor-content h2{font-family:var(--head);font-size:1.5rem;font-weight:600;color:var(--text);letter-spacing:1px;margin:14px 0 6px;}
.editor-content h3{font-family:var(--head);font-size:1.15rem;font-weight:600;color:var(--orange);letter-spacing:1px;margin:10px 0 4px;}
.editor-content p{margin-bottom:8px;}
.editor-content ul{margin:8px 0 8px 20px;list-style:none;}
.editor-content ul li::before{content:"▸ ";color:var(--orange);}
.editor-content ol{margin:8px 0 8px 24px;}
.editor-content ol li{margin-bottom:4px;}
.editor-content pre{background:#0d0f14;border:1px solid var(--border2);border-left:3px solid var(--orange);border-radius:4px;padding:12px 14px;font-family:var(--mono);font-size:0.82rem;color:#e2e8f0;overflow-x:auto;margin:10px 0;white-space:pre-wrap;}
.editor-content code{background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);border-radius:3px;padding:1px 6px;font-family:var(--mono);font-size:0.82rem;color:var(--orange);}
.editor-content pre code{background:transparent;border:none;padding:0;color:#e2e8f0;}
.editor-content blockquote{border-left:3px solid var(--orange);padding-left:14px;margin:10px 0;color:var(--text2);font-style:italic;}

/* Note footer */
.note-footer{height:32px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;}
.nf-dot{width:5px;height:5px;border-radius:50%;background:var(--text3);transition:all 0.3s;}
.nf-dot.saved{background:var(--green);box-shadow:0 0 5px var(--green);}
.nf-meta{font-family:var(--mono);font-size:0.58rem;color:var(--text3);}
.nf-meta span{color:var(--text2);}
.nf-actions{display:flex;gap:5px;margin-left:auto;}
.nf-btn{height:24px;padding:0 10px;background:transparent;border:1px solid var(--border2);border-radius:3px;font-family:var(--mono);font-size:0.58rem;letter-spacing:1px;color:var(--text2);cursor:pointer;transition:all 0.15s;}
.nf-btn:hover{border-color:var(--orange);color:var(--orange);}
.nf-btn.pdf{border-color:rgba(239,68,68,0.3);color:var(--red);}
.nf-btn.pdf:hover{border-color:var(--red);background:rgba(239,68,68,0.08);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadein 0.15s ease;}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:10px;box-shadow:0 24px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(249,115,22,0.08);animation:modalin 0.2s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes modalin{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.modal-title{font-family:var(--head);font-size:1rem;font-weight:700;color:var(--text);letter-spacing:1px;flex:1;}
.modal-close{width:26px;height:26px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.modal-close:hover{border-color:var(--red);color:var(--red);}
.modal-body{padding:16px;}
.modal-input{width:100%;height:36px;background:var(--bg2);border:1px solid var(--border2);border-radius:5px;padding:0 12px;font-family:var(--mono);font-size:0.75rem;color:var(--text);outline:none;transition:border-color 0.2s;}
.modal-input:focus{border-color:var(--orange);}
.modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.modal-btn{height:32px;padding:0 16px;border-radius:4px;font-family:var(--head);font-weight:600;font-size:0.78rem;cursor:pointer;transition:all 0.15s;}
.modal-btn.primary{background:var(--orange);border:none;color:#000;}
.modal-btn.primary:hover{background:var(--amber);}
.modal-btn.cancel{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.modal-btn.cancel:hover{border-color:var(--text2);color:var(--text);}

/* ── EXPORT PANEL ── */
.export-panel{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;}
.export-box{background:var(--panel);border:1px solid var(--border2);border-radius:10px;width:380px;padding:20px;animation:modalin 0.2s ease;}
.export-title{font-family:var(--head);font-size:1rem;font-weight:700;color:var(--text);letter-spacing:1px;margin-bottom:14px;}
.export-options{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.export-opt{border:1px solid var(--border2);border-radius:6px;padding:12px 8px;cursor:pointer;text-align:center;transition:all 0.15s;background:var(--bg2);}
.export-opt:hover{border-color:var(--orange);background:rgba(249,115,22,0.06);}
.export-opt-icon{font-size:1.5rem;margin-bottom:6px;}
.export-opt-label{font-family:var(--mono);font-size:0.62rem;color:var(--text2);}
.export-cancel{width:100%;height:32px;background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--text2);font-family:var(--mono);font-size:0.65rem;cursor:pointer;transition:all 0.15s;}
.export-cancel:hover{border-color:var(--text2);color:var(--text);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── PRINT CONTAINER (hidden, used for PDF rendering) ── */
#pdf-render-zone {
  position: fixed;
  left: -9999px;
  top: 0;
  width: 794px; /* A4 at 96dpi */
  background: #0a0b0d;
  font-family: 'Caveat', cursive;
  color: #e8dcc8;
  padding: 0;
  z-index: -1;
  pointer-events: none;
}
.pdf-page {
  width: 794px;
  min-height: 1123px;
  background: #0a0b0d;
  padding: 54px 64px 60px;
  position: relative;
  page-break-after: always;
  box-sizing: border-box;
}
.pdf-top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 8px;
  background: #f97316;
}
.pdf-header-band {
  position: absolute;
  top: 8px; left: 0; right: 0;
  height: 26px;
  background: #111318;
  display: flex; align-items: center;
  padding: 0 64px;
  gap: 0;
}
.pdf-header-app {
  font-family: 'Rajdhani', sans-serif;
  font-size: 9px; font-weight: 700;
  color: #f97316; letter-spacing: 2px;
}
.pdf-header-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; color: #5a6275;
  margin-left: 14px;
}
.pdf-content {
  margin-top: 34px;
}
.pdf-note-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 28px; font-weight: 700;
  color: #e8dcc8; letter-spacing: 2px;
  margin-bottom: 6px;
  line-height: 1.2;
}
.pdf-tags {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: #f97316;
  margin-bottom: 10px;
}
.pdf-divider {
  border: none;
  border-top: 1px solid #f97316;
  margin: 10px 0 18px;
}
.pdf-body {
  font-family: 'Caveat', cursive;
  font-size: 17px;
  line-height: 1.85;
  color: #e8dcc8;
}
.pdf-body h1 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 26px; font-weight: 700;
  color: #e8dcc8; letter-spacing: 2px;
  margin: 18px 0 6px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(249,115,22,0.5);
}
.pdf-body h2 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px; font-weight: 600;
  color: #d4d8e0; letter-spacing: 1px;
  margin: 14px 0 5px;
}
.pdf-body h3 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px; font-weight: 600;
  color: #f97316; letter-spacing: 1px;
  margin: 10px 0 4px;
}
.pdf-body p { margin-bottom: 8px; }
.pdf-body strong, .pdf-body b { color: #fff; font-weight: 700; }
.pdf-body em, .pdf-body i { color: #b4bac8; font-style: italic; }
.pdf-body u { text-decoration: underline; }
.pdf-body ul {
  margin: 6px 0 6px 4px;
  list-style: none;
  padding: 0;
}
.pdf-body ul li::before { content: "▸ "; color: #f97316; }
.pdf-body ol { margin: 6px 0 6px 20px; }
.pdf-body ol li { margin-bottom: 3px; }
.pdf-body pre {
  background: #080a0c;
  border: 1px solid #262b35;
  border-left: 3px solid #f97316;
  border-radius: 4px;
  padding: 10px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: #86efac;
  overflow: hidden;
  margin: 10px 0;
  white-space: pre-wrap;
  word-break: break-all;
}
.pdf-body code {
  background: rgba(249,115,22,0.12);
  border: 1px solid rgba(249,115,22,0.25);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: #f97316;
}
.pdf-body pre code {
  background: transparent; border: none; padding: 0;
  color: #86efac; font-size: 11px;
}
.pdf-body blockquote {
  border-left: 3px solid #f97316;
  padding-left: 14px;
  margin: 8px 0;
  color: #6b7280;
  font-style: italic;
}
.pdf-footer {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 20px;
  background: #111318;
  display: flex; align-items: center;
  padding: 0 64px;
  justify-content: space-between;
}
.pdf-footer-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; color: #3a3f4a;
}
.pdf-footer-page {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px; color: #f97316;
}

</style>
</head>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// ── STORAGE ──────────────────────────────────────────
const DB_KEY = 'lb_notebooks_v4';
const VID_KEY = 'lb_video_v2';

function loadDB(){
  try{
    const d=JSON.parse(localStorage.getItem(DB_KEY));
    if(d && d.notebooks) return d;
  }catch{}
  // default preloaded data
  const now=Date.now();
  return {
    notebooks:[
      {id:now+1, name:'SQL', icon:'🗄️', notes:[
        {id:now+10,title:'Joins',tags:['SQL','Query'],progress:0,content:'<h2>SQL Joins</h2><p>Write your notes about SQL Joins here...</p>',created:now,updated:now},
        {id:now+11,title:'Constraints',tags:['SQL','Schema'],progress:0,content:'<h2>Constraints</h2><p>PRIMARY KEY, FOREIGN KEY, UNIQUE, NOT NULL, CHECK...</p>',created:now,updated:now},
        {id:now+12,title:'Indexes',tags:['SQL','Performance'],progress:0,content:'<h2>Indexes</h2><p>Indexes speed up data retrieval. Types: clustered, non-clustered...</p>',created:now,updated:now},
      ]},
      {id:now+2, name:'DSA', icon:'🧮', notes:[
        {id:now+20,title:'Recursion',tags:['DSA','Algo'],progress:0,content:'<h2>Recursion</h2><p>A function that calls itself. Base case is essential...</p>',created:now,updated:now},
        {id:now+21,title:'Linked List',tags:['DSA','DataStructure'],progress:0,content:'<h2>Linked List</h2><p>Node → Node → Node → null. Single, Double, Circular...</p>',created:now,updated:now},
        {id:now+22,title:'Sorting',tags:['DSA','Algo'],progress:0,content:'<h2>Sorting Algorithms</h2><p>Bubble, Selection, Insertion, Merge, Quick Sort...</p>',created:now,updated:now},
      ]},
    ]
  };
}

function saveDB(db){ localStorage.setItem(DB_KEY,JSON.stringify(db)); }
function loadVideo(){ return localStorage.getItem(VID_KEY)||''; }
function saveVideo(v){ localStorage.setItem(VID_KEY,v); }

function extractVideoId(url){
  const p=[
    /[?&]v=([^&]+)/,
    /youtu\.be\/([^?&]+)/,
    /embed\/([^?&]+)/,
    /shorts\/([^?&]+)/,
  ];
  for(const r of p){ const m=url.match(r); if(m) return m[1]; }
  return null;
}

// ── TIMER ──────────────────────────────────────────
function Timer(){
  const [secs,setSecs]=useState(0);
  const [running,setRunning]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(running) ref.current=setInterval(()=>setSecs(s=>s+1),1000);
    else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[running]);
  const fmt=s=>{
    const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sc=s%60;
    return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`;
  };
  return(
    <div className="timer-block">
      <div className={`timer-digits${!running&&secs>0?' paused':''}`}>{fmt(secs)}</div>
      <div style={{display:'flex',gap:'3px'}}>
        <button className={`timer-btn${running?' active':''}`} onClick={()=>setRunning(r=>!r)} title={running?'Pause':'Start'}>
          {running?'⏸':'▶'}
        </button>
        <button className="timer-btn" onClick={()=>{setRunning(false);setSecs(0);}} title="Reset">↺</button>
      </div>
    </div>
  );
}

// ── VIDEO PANE ──────────────────────────────────────
function VideoPane({videoId}){
  const [embedErr,setEmbedErr]=useState(false);
  const [loading,setLoading]=useState(false);
  const [src,setSrc]=useState('youtube');
  const [localFile,setLocalFile]=useState(null);
  const [isDrag,setIsDrag]=useState(false);
  const fileRef=useRef();

  useEffect(()=>{setEmbedErr(false);setLoading(!!videoId);},[videoId]);

  function handleLocalFile(file){
    if(!file||!file.type.startsWith('video/')) return;
    if(localFile?.url) URL.revokeObjectURL(localFile.url);
    setLocalFile({url:URL.createObjectURL(file),name:file.name});
  }

      </div>

                  <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                  Open on YouTube

              </div>
            ):(
              <div style={{position:'relative',width:'100%',height:'100%'}}>
                {loading&&<div className="video-loading"><div className="vl-spinner"/><div className="vl-text">LOADING...</div></div>}
                <iframe key={videoId} src={embedSrc} allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;web-share" allowFullScreen title="Video" onLoad={()=>setLoading(false)} onError={()=>{setLoading(false);setEmbedErr(true);}} style={{opacity:loading?0:1,transition:'opacity 0.3s'}}/>

            )
          ):(

            >
              <input type="file" accept="video/*" ref={fileRef} style={{display:'none'}} onChange={e=>handleLocalFile(e.target.files[0])}/>
              <div className="local-drop-icon">

          )}
          {src==='local'&&localFile&&(
            <button onClick={()=>fileRef.current?.click()} style={{cursor:'pointer',background:'rgba(249,115,22,0.1)',border:'1px solid rgba(249,115,22,0.3)',color:'#f97316',borderRadius:'3px',padding:'2px 7px',fontSize:'0.58rem',fontFamily:'var(--mono)'}}>↺ Change</button>
          )}
          <div className="status-badge">{(src==='youtube'?videoId:localFile)?'ACTIVE':'IDLE'}</div>
        </div>
      </div>
    </div>
  );
}

// ── EDITOR TOOLBAR ──────────────────────────────────
function EditorToolbar({onCommand}){
  const colors=['#e8dcc8','#f97316','#fbbf24','#22c55e','#3b82f6','#a855f7','#ef4444','#ec4899'];
  const highlights=['transparent','rgba(249,115,22,0.25)','rgba(251,191,36,0.3)','rgba(34,197,94,0.25)','rgba(59,130,246,0.25)','rgba(239,68,68,0.25)'];
  const [showColor,setShowColor]=useState(false);
  const [showHL,setShowHL]=useState(false);

  const cmd=(c,v)=>{document.execCommand(c,false,v);};
  return(
    <div className="editor-toolbar">
      {/* History */}
      <div className="tb-group">
        <button className="tool-btn" onClick={()=>cmd('undo')} title="Undo">↩</button>
        <button className="tool-btn" onClick={()=>cmd('redo')} title="Redo">↪</button>
      </div>
      <div className="tb-divider"/>
      {/* Headings */}
      <select className="tool-select" onChange={e=>{cmd('formatBlock',e.target.value);e.target.value='';}} defaultValue="">
        <option value="" disabled>Heading</option>
        <option value="h1">H1</option>
        <option value="h2">H2</option>
        <option value="h3">H3</option>
        <option value="p">Normal</option>
      </select>
      <div className="tb-divider"/>
      {/* Format */}
      <div className="tb-group">
        <button className="tool-btn" onClick={()=>cmd('bold')} title="Bold"><strong>B</strong></button>
        <button className="tool-btn" onClick={()=>cmd('italic')} title="Italic"><em>I</em></button>
        <button className="tool-btn" onClick={()=>cmd('underline')} title="Underline" style={{textDecoration:'underline'}}>U</button>
        <button className="tool-btn" onClick={()=>cmd('strikeThrough')} title="Strikethrough" style={{textDecoration:'line-through'}}>S</button>
      </div>
      <div className="tb-divider"/>
      {/* Lists */}
      <div className="tb-group">
        <button className="tool-btn" onClick={()=>cmd('insertUnorderedList')} title="Bullet list">• ≡</button>
        <button className="tool-btn" onClick={()=>cmd('insertOrderedList')} title="Numbered list">1 ≡</button>
      </div>
      <div className="tb-divider"/>
      {/* Alignment */}
      <div className="tb-group">
        <button className="tool-btn" onClick={()=>cmd('justifyLeft')} title="Align left">⬅</button>
        <button className="tool-btn" onClick={()=>cmd('justifyCenter')} title="Center">⬌</button>
        <button className="tool-btn" onClick={()=>cmd('justifyRight')} title="Align right">➡</button>
      </div>
      <div className="tb-divider"/>
      {/* Code */}
      <div className="tb-group">
        <button className="tool-btn" onClick={()=>onCommand('code')} title="Inline code" style={{fontFamily:'monospace',fontSize:'0.65rem'}}>{'<>'}</button>
        <button className="tool-btn" onClick={()=>onCommand('codeblock')} title="Code block" style={{fontFamily:'monospace',fontSize:'0.58rem'}}>{'```'}</button>
      </div>
      <div className="tb-divider"/>
      {/* Color */}
      <div style={{position:'relative'}}>
        <button className="tool-btn" onClick={()=>{setShowColor(v=>!v);setShowHL(false);}} title="Text color" style={{fontSize:'0.85rem'}}>A</button>
        {showColor&&(
          <div style={{position:'absolute',top:'30px',left:0,background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:'6px',padding:'8px',display:'flex',flexWrap:'wrap',gap:'4px',zIndex:100,width:'120px'}}>
            {colors.map(c=>(
              <button key={c} className="color-btn" style={{background:c}} onClick={()=>{cmd('foreColor',c);setShowColor(false);}}/>
            ))}
          </div>
        )}
      </div>
      {/* Highlight */}
      <div style={{position:'relative'}}>
        <button className="tool-btn" onClick={()=>{setShowHL(v=>!v);setShowColor(false);}} title="Highlight" style={{fontSize:'0.85rem'}}>🖌</button>
        {showHL&&(
          <div style={{position:'absolute',top:'30px',left:0,background:'var(--panel)',border:'1px solid var(--border2)',borderRadius:'6px',padding:'8px',display:'flex',flexWrap:'wrap',gap:'4px',zIndex:100,width:'120px'}}>
            {highlights.map((c,i)=>(
              <button key={i} className="color-btn" style={{background:c==='transparent'?'var(--bg3)':c,border:'2px solid var(--border2)'}} onClick={()=>{cmd('backColor',c==='transparent'?'transparent':c);setShowHL(false);}}/>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── NOTE EDITOR ─────────────────────────────────────
function NoteEditor({note,onUpdate,onExport}){
  const editorRef=useRef();
  const saveTimer=useRef();
  const [savedDot,setSavedDot]=useState(false);
  const [tagInput,setTagInput]=useState('');

  useEffect(()=>{
    if(editorRef.current && note){
      editorRef.current.innerHTML=note.content||'';
    }
  },[note?.id]);

  function schedSave(){
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      if(editorRef.current && note){
        onUpdate({content:editorRef.current.innerHTML});
        setSavedDot(true);
        setTimeout(()=>setSavedDot(false),2000);
      }
    },500);
  }

  function handleToolCmd(cmd){
    const sel=window.getSelection();
    if(cmd==='code'){
      const txt=sel.toString();
      document.execCommand('insertHTML',false,`<code>${txt||'code'}</code>`);
    } else if(cmd==='codeblock'){
      const txt=sel.toString();
      document.execCommand('insertHTML',false,`<pre><code>${txt||'// your code here'}</code></pre>`);
    }
  }

  function addTag(e){
    if(e.key==='Enter'&&tagInput.trim()){
      const t=tagInput.trim().replace(/\s+/g,'-');
      if(!note.tags.includes(t)) onUpdate({tags:[...note.tags,t]});
      setTagInput('');
    }
  }

  function removeTag(t){
    onUpdate({tags:note.tags.filter(x=>x!==t)});
  }

  if(!note) return(
    <div className="note-pane">
      <div className="note-pane-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/>
        </svg>
        <div className="note-pane-empty-title">NO NOTE SELECTED</div>
        <div className="note-pane-empty-sub">Select a note from the sidebar<br/>or create a new one to start writing</div>
      </div>
    </div>
  );

  const wordCount=editorRef.current?.innerText?.trim().split(/\s+/).filter(Boolean).length||0;

  return(
    <div className="note-pane">
      {/* Note Header */}
      <div className="note-header">
        <div className="note-title-row">
          <input
            className="note-title-input"
            value={note.title}
            onChange={e=>onUpdate({title:e.target.value})}
            placeholder="Note Title..."
          />
        </div>

        {/* Tags */}
        <div className="note-meta-row">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          {note.tags.map(t=>(
            <span key={t} className="tag">
              {t}
              <span className="tag-del" onClick={()=>removeTag(t)}>✕</span>
            </span>
          ))}
          <input
            className="tag-add-input"
            placeholder="+ add tag, Enter"
            value={tagInput}
            onChange={e=>setTagInput(e.target.value)}
            onKeyDown={addTag}
          />
        </div>

        {/* Progress */}
        <div className="progress-row">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/>
          </svg>
          <span className="progress-label">Lecture Progress</span>
          <input
            type="range" min="0" max="100"
            className="progress-slider"
            value={note.progress||0}
            onChange={e=>onUpdate({progress:parseInt(e.target.value)})}
          />
          <span className="progress-val">{note.progress||0}%</span>
        </div>
      </div>

      {/* Toolbar */}
      <EditorToolbar onCommand={handleToolCmd}/>

      {/* Editor */}
      <div className="editor-body">
        <div
          ref={editorRef}
          className="editor-content"
          contentEditable
          suppressContentEditableWarning
          data-placeholder="Start writing your notes here... Use the toolbar above for formatting."
          onInput={schedSave}
        />
      </div>

      {/* Footer */}
      <div className="note-footer">
        <div className={`nf-dot${savedDot?' saved':''}`}/>
        <span className="nf-meta"><span>{wordCount}</span> words · {new Date(note.updated).toLocaleDateString()}</span>
        <div className="nf-actions">
          <button className="nf-btn" onClick={()=>onExport('md')}>MD</button>
          <button className="nf-btn" onClick={()=>onExport('txt')}>TXT</button>
          <button className="nf-btn pdf" onClick={()=>onExport('pdf')}>PDF</button>
        </div>
      </div>
    </div>
  );
}

// ── SIDEBAR ──────────────────────────────────────────
function Sidebar({db,setDB,activeNoteId,setActiveNoteId,searchQuery}){
  const [openNBs,setOpenNBs]=useState(()=>db.notebooks.map(n=>n.id));
  const [renamingNB,setRenamingNB]=useState(null);
  const [renamingNote,setRenamingNote]=useState(null);
  const [renameVal,setRenameVal]=useState('');
  const [newNBModal,setNewNBModal]=useState(false);
  const [newNBName,setNewNBName]=useState('');

  function toggleNB(id){
    setOpenNBs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  }

  function addNotebook(){
    if(!newNBName.trim()) return;
    const nb={id:Date.now(),name:newNBName.trim(),icon:'📁',notes:[]};
    setDB(d=>{const n={...d,notebooks:[...d.notebooks,nb]};saveDB(n);return n;});
    setNewNBModal(false);setNewNBName('');
    setOpenNBs(p=>[...p,nb.id]);
  }

  function deleteNotebook(id){
    if(!confirm('Delete this notebook and ALL its notes?')) return;
    setDB(d=>{const n={...d,notebooks:d.notebooks.filter(nb=>nb.id!==id)};saveDB(n);return n;});
    setActiveNoteId(null);
  }

  function renameNotebook(id,name){
    setDB(d=>{const n={...d,notebooks:d.notebooks.map(nb=>nb.id===id?{...nb,name}:nb)};saveDB(n);return n;});
    setRenamingNB(null);
  }

  function addNote(nbId){
    const note={id:Date.now(),title:'New Note',tags:[],progress:0,content:'',created:Date.now(),updated:Date.now()};
    setDB(d=>{
      const n={...d,notebooks:d.notebooks.map(nb=>nb.id===nbId?{...nb,notes:[...nb.notes,note]}:nb)};
      saveDB(n);return n;
    });
    setActiveNoteId(note.id);
    setOpenNBs(p=>p.includes(nbId)?p:[...p,nbId]);
  }

  function deleteNote(nbId,noteId){
    if(!confirm('Delete this note?')) return;
    setDB(d=>{
      const n={...d,notebooks:d.notebooks.map(nb=>nb.id===nbId?{...nb,notes:nb.notes.filter(n=>n.id!==noteId)}:nb)};
      saveDB(n);return n;
    });
    if(activeNoteId===noteId) setActiveNoteId(null);
  }

  function renameNote(nbId,noteId,title){
    setDB(d=>{
      const n={...d,notebooks:d.notebooks.map(nb=>nb.id===nbId?{...nb,notes:nb.notes.map(n=>n.id===noteId?{...n,title}:n)}:nb)};
      saveDB(n);return n;
    });
    setRenamingNote(null);
  }

  // Filter by search
  const filtered=db.notebooks.map(nb=>({
    ...nb,
    notes:nb.notes.filter(n=>
      !searchQuery ||
      n.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
      n.tags.some(t=>t.toLowerCase().includes(searchQuery.toLowerCase()))
    )
  })).filter(nb=>!searchQuery||nb.notes.length>0);

  return(
    <div className="sidebar">
      <div className="sb-header">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <span className="sb-title">NOTEBOOKS</span>
        <button className="sb-add-btn" onClick={()=>setNewNBModal(true)} title="New Notebook">＋</button>
      </div>

      <div className="sb-body">
        {filtered.map(nb=>(
          <div key={nb.id} className="nb-item">
            <div className={`nb-head${openNBs.includes(nb.id)?' active':''}`}>
              <span className={`nb-arrow${openNBs.includes(nb.id)?' open':''}`} onClick={()=>toggleNB(nb.id)}>▶</span>
              <span className="nb-icon" onClick={()=>toggleNB(nb.id)}>{nb.icon}</span>
              {renamingNB===nb.id?(
                <input
                  className="inline-input"
                  value={renameVal}
                  autoFocus
                  onChange={e=>setRenameVal(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter')renameNotebook(nb.id,renameVal);if(e.key==='Escape')setRenamingNB(null);}}
                  onBlur={()=>setRenamingNB(null)}
                />
              ):(
                <span className="nb-name" onClick={()=>toggleNB(nb.id)}>{nb.name}</span>
              )}
              <span className="nb-count">{nb.notes.length}</span>
              <div className="nb-actions">
                <button className="nb-action-btn" onClick={()=>addNote(nb.id)} title="Add note">＋</button>
                <button className="nb-action-btn" onClick={()=>{setRenamingNB(nb.id);setRenameVal(nb.name);}} title="Rename">✎</button>
                <button className="nb-action-btn del" onClick={()=>deleteNotebook(nb.id)} title="Delete">🗑</button>
              </div>
            </div>

            {openNBs.includes(nb.id)&&(
              <div className="nb-notes">
                {nb.notes.map(note=>(
                  <div key={note.id} className={`note-sb-item${activeNoteId===note.id?' active':''}`}>
                    <span className="note-sb-dot"/>
                    {renamingNote===note.id?(
                      <input
                        className="inline-input"
                        value={renameVal}
                        autoFocus
                        onChange={e=>setRenameVal(e.target.value)}
                        onKeyDown={e=>{if(e.key==='Enter')renameNote(nb.id,note.id,renameVal);if(e.key==='Escape')setRenamingNote(null);}}
                        onBlur={()=>setRenamingNote(null)}
                        style={{fontSize:'0.63rem'}}
                      />
                    ):(
                      <span className="note-sb-name" onClick={()=>setActiveNoteId(note.id)}>{note.title}</span>
                    )}
                    <div className="note-sb-actions">
                      <button className="nb-action-btn" onClick={()=>{setRenamingNote(note.id);setRenameVal(note.title);}} title="Rename">✎</button>
                      <button className="nb-action-btn del" onClick={()=>deleteNote(nb.id,note.id)} title="Delete">✕</button>
                    </div>
                  </div>
                ))}
                <div
                  onClick={()=>addNote(nb.id)}
                  style={{display:'flex',alignItems:'center',gap:'4px',padding:'4px 6px',cursor:'pointer',opacity:0.4,transition:'opacity 0.15s'}}
                  onMouseEnter={e=>e.currentTarget.style.opacity=1}
                  onMouseLeave={e=>e.currentTarget.style.opacity=0.4}
                >
                  <span style={{fontFamily:'var(--mono)',fontSize:'0.6rem',color:'var(--orange)'}}>＋ new note</span>
                </div>
              </div>
            )}
          </div>
        ))}

        {filtered.length===0&&searchQuery&&(
          <div style={{textAlign:'center',color:'var(--text3)',fontFamily:'var(--mono)',fontSize:'0.63rem',padding:'20px 10px'}}>
            No notes found for<br/><strong style={{color:'var(--orange)'}}>"{searchQuery}"</strong>
          </div>
        )}
      </div>

      {/* New Notebook Modal */}
      {newNBModal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setNewNBModal(false)}>
          <div className="modal" style={{width:'340px'}}>
            <div className="modal-header">
              <span className="modal-title">New Notebook</span>
              <button className="modal-close" onClick={()=>setNewNBModal(false)}>✕</button>
            </div>
            <div className="modal-body">
              <input
                className="modal-input"
                placeholder="Notebook name (e.g. Web Dev, Machine Learning...)"
                value={newNBName}
                autoFocus
                onChange={e=>setNewNBName(e.target.value)}
                onKeyDown={e=>e.key==='Enter'&&addNotebook()}
              />
            </div>
            <div className="modal-footer">
              <button className="modal-btn cancel" onClick={()=>setNewNBModal(false)}>Cancel</button>
              <button className="modal-btn primary" onClick={addNotebook}>Create</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────
function App(){
  const [db,setDB]=useState(()=>loadDB());
  const [activeNoteId,setActiveNoteId]=useState(null);
  const [urlInput,setUrlInput]=useState(()=>loadVideo());
  const [videoId,setVideoId]=useState(()=>{const s=loadVideo();return s?extractVideoId(s):null;});
  const [searchQuery,setSearchQuery]=useState('');
  const [showExport,setShowExport]=useState(false);

  // Find active note
  const activeNote=db.notebooks.flatMap(nb=>nb.notes).find(n=>n.id===activeNoteId)||null;
  const activeNB=db.notebooks.find(nb=>nb.notes.some(n=>n.id===activeNoteId));

  function updateNote(changes){
    if(!activeNoteId) return;
    setDB(d=>{
      const n={...d,notebooks:d.notebooks.map(nb=>({...nb,notes:nb.notes.map(note=>note.id===activeNoteId?{...note,...changes,updated:Date.now()}:note)}))};
      saveDB(n);return n;
    });
  }

  function handleLoad(e){
    e&&e.preventDefault();
    const id=extractVideoId(urlInput.trim());
    if(!id){alert('Invalid YouTube URL');return;}
    setVideoId(id);saveVideo(urlInput.trim());
  }

  function handleExport(type){
    if(!activeNote) return;
    const title=activeNote.title||'note';
    if(type==='txt'){
      const tmp=document.createElement('div');tmp.innerHTML=activeNote.content;
      const txt=tmp.innerText;
      const b=new Blob([`${title}\n${'='.repeat(title.length)}\n\n${txt}`],{type:'text/plain'});
      dl(b,`${title}.txt`);
    } else if(type==='md'){
      const tmp=document.createElement('div');tmp.innerHTML=activeNote.content;
      let md=`# ${title}\n\nTags: ${activeNote.tags.join(', ')}\nProgress: ${activeNote.progress}%\n\n`;
      md+=htmlToMarkdown(activeNote.content);
      const b=new Blob([md],{type:'text/markdown'});
      dl(b,`${title}.md`);
    } else if(type==='pdf'){
      exportPDF(activeNote);
    }
    setShowExport(false);
  }

  function htmlToMarkdown(html){
    let md=html
      .replace(/<h1>(.*?)<\/h1>/gi,'# $1\n')
      .replace(/<h2>(.*?)<\/h2>/gi,'## $1\n')
      .replace(/<h3>(.*?)<\/h3>/gi,'### $1\n')
      .replace(/<strong>(.*?)<\/strong>/gi,'**$1**')
      .replace(/<b>(.*?)<\/b>/gi,'**$1**')
      .replace(/<em>(.*?)<\/em>/gi,'*$1*')
      .replace(/<i>(.*?)<\/i>/gi,'*$1*')
      .replace(/<u>(.*?)<\/u>/gi,'$1')
      .replace(/<code>(.*?)<\/code>/gi,'`$1`')
      .replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/gi,'```\n$1\n```')
      .replace(/<li>(.*?)<\/li>/gi,'- $1')
      .replace(/<br\s*\/?>/gi,'\n')
      .replace(/<p>(.*?)<\/p>/gi,'$1\n')
      .replace(/<[^>]+>/g,'');
    return md;
  }

  function exportPDF(note){
    const title = note.title || 'note';
    const nbName = activeNB?.name || 'Notebook';

    // ── Build hidden render zone ──
    let zone = document.getElementById('pdf-render-zone');
    if(zone) zone.remove();
    zone = document.createElement('div');
    zone.id = 'pdf-render-zone';

    const dateStr = new Date(note.updated).toLocaleDateString();
    const tagsStr = note.tags && note.tags.length ? note.tags.map(t=>'#'+t).join('  ') : '';

    zone.innerHTML = `
      <div class="pdf-page">
        <div class="pdf-top-bar"></div>
        <div class="pdf-header-band">
          <span class="pdf-header-app">LEARNBOARD</span>
          <span class="pdf-header-meta">${nbName}  ·  ${dateStr}  ·  Progress: ${note.progress||0}%</span>
        </div>
        <div class="pdf-content">
          <div class="pdf-note-title">${title}</div>
          ${tagsStr ? `<div class="pdf-tags">${tagsStr}</div>` : ''}
          <hr class="pdf-divider"/>
          <div class="pdf-body">${note.content||'<p>Empty note.</p>'}</div>
        </div>
        <div class="pdf-footer">
          <span class="pdf-footer-text">LearnBoard  ·  ${title}</span>
          <span class="pdf-footer-page">Page 1</span>
        </div>
      </div>
    `;
    document.body.appendChild(zone);

    // Wait for fonts to load then capture
    document.fonts.ready.then(() => {
      setTimeout(() => {
        const page = zone.querySelector('.pdf-page');
        html2canvas(page, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#0a0b0d',
          logging: false,
          width: 794,
          height: Math.max(1123, page.scrollHeight),
        }).then(canvas => {
          const {jsPDF} = window.jspdf;
          const imgData = canvas.toDataURL('image/jpeg', 0.95);
          const canvasW = canvas.width;
          const canvasH = canvas.height;

          // A4 dimensions
          const pW = 210, pH = 297;
          // How many A4 pages do we need?
          const pxPerPage = Math.round(canvasW * (297 / 210)); // canvas px for one A4 height
          const totalPages = Math.ceil(canvasH / pxPerPage);

          const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4', compress:true });

          for(let p = 0; p < totalPages; p++){
            if(p > 0) doc.addPage();

            // Crop canvas for this page
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvasW;
            tempCanvas.height = pxPerPage;
            const ctx = tempCanvas.getContext('2d');
            ctx.fillStyle = '#0a0b0d';
            ctx.fillRect(0, 0, canvasW, pxPerPage);
            ctx.drawImage(canvas, 0, -(p * pxPerPage));

            // Update page number in footer area (bottom 40px approx)
            ctx.fillStyle = '#111318';
            ctx.fillRect(0, pxPerPage - 40, canvasW, 40);
            ctx.font = '14px JetBrains Mono';
            ctx.fillStyle = '#3a3f4a';
            ctx.fillText(`LearnBoard  ·  ${title}`, 30, pxPerPage - 12);
            ctx.fillStyle = '#f97316';
            ctx.textAlign = 'right';
            ctx.fillText(`${p+1} / ${totalPages}`, canvasW - 30, pxPerPage - 12);

            const pageImg = tempCanvas.toDataURL('image/jpeg', 0.95);
            doc.addImage(pageImg, 'JPEG', 0, 0, pW, pH);
          }

          doc.save(`${title.replace(/\s+/g,'_')}.pdf`);
          zone.remove();
        }).catch(err => {
          console.error('html2canvas error:', err);
          zone.remove();
          alert('PDF generation failed. Please try again.');
        });
      }, 300);
    });
  }

  function dl(blob,name){
    const u=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=u;a.download=name;a.click();
    URL.revokeObjectURL(u);
  }

  function manualBackup(){
    const data=JSON.stringify(db,null,2);
    dl(new Blob([data],{type:'application/json'}),`learnboard_backup_${new Date().toISOString().slice(0,10)}.json`);
  }

          LearnBoard
        </div>
        <div className="tb-sep"/>

        {/* URL input */}
        <form onSubmit={handleLoad} style={{display:'flex',gap:'6px',flexShrink:0}}>
          <input
            style={{height:'30px',width:'240px',background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:'4px',padding:'0 10px',fontFamily:'var(--mono)',fontSize:'0.68rem',color:'var(--text)',outline:'none'}}
            value={urlInput}
            onChange={e=>setUrlInput(e.target.value)}
            placeholder="Paste YouTube URL…"
            spellCheck={false}
          />
          <button style={{height:'30px',padding:'0 12px',background:'var(--orange)',border:'none',borderRadius:'4px',fontFamily:'var(--head)',fontWeight:700,fontSize:'0.78rem',color:'#000',cursor:'pointer'}} type="submit">LOAD →</button>
        </form>

        <div className="tb-sep"/>

        {/* Search */}
        <div className="tb-search-wrap">
          <svg className="tb-search-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            className="tb-search"
            placeholder="Search notes, tags…"
            value={searchQuery}
            onChange={e=>setSearchQuery(e.target.value)}
          />
        </div>

        {/* Right */}
        <div className="tb-right">
          {activeNote&&(
            <button className="tb-btn" onClick={()=>setShowExport(true)}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Export
            </button>
          )}
          <button className="tb-btn" onClick={manualBackup} title="Backup all data as JSON">
            💾 Backup
          </button>
          <Timer/>
        </div>
      </header>

      {/* EXPORT PANEL */}
      {showExport&&(
        <div className="export-panel" onClick={e=>e.target===e.currentTarget&&setShowExport(false)}>
          <div className="export-box">
            <div className="export-title">Export: {activeNote?.title}</div>
            <div className="export-options">
              <div className="export-opt" onClick={()=>handleExport('pdf')}>
                <div className="export-opt-icon">📕</div>
                <div className="export-opt-label">PDF</div>
              </div>
              <div className="export-opt" onClick={()=>handleExport('txt')}>
                <div className="export-opt-icon">📄</div>
                <div className="export-opt-label">TXT</div>
              </div>
              <div className="export-opt" onClick={()=>handleExport('md')}>
                <div className="export-opt-icon">⬇️</div>
                <div className="export-opt-label">Markdown</div>
              </div>
            </div>
            <button className="export-cancel" onClick={()=>setShowExport(false)}>Cancel</button>
          </div>
        </div>
      )}

      {/* WORKSPACE */}
      <main className="workspace">
        <Sidebar
          db={db}
          setDB={setDB}
          activeNoteId={activeNoteId}
          setActiveNoteId={setActiveNoteId}
          searchQuery={searchQuery}
        />
        <VideoPane videoId={videoId}/>
        <NoteEditor
          note={activeNote}
          onUpdate={updateNote}
          onExport={type=>handleExport(type)}
        />
      </main>
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
